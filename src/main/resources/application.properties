spring.application.name=token-bucket-rate-limiter

# =========================
# Rate Limiter Configuration
# =========================
rate-limiter.capacity=${RATE_LIMITER_CAPACITY:20}
rate-limiter.refill-rate=${RATE_LIMITER_REFILL_RATE:5}

# =========================
# Redis Configuration
# =========================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# =========================
# Spring Profile
# =========================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:redis}
# Default: redis
# To use memory profile locally:
# SPRING_PROFILES_ACTIVE=memory

# =========================
# Actuator Configuration
# =========================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Optional
# management.endpoints.web.base-path=/actuator